<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Pistons Game</title>
<link rel="stylesheet" href="https://use.typekit.net/biq6rwr.css">
<link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

	<ul id="nav">
		<li><a href="#screen1_bg"><img src="images/ball1.png" alt="MainLink" /></a></li>
	    <li><a href="#screen2_bg"><img src="images/ball2.png" alt="MainLink 2" /></a></li>
	    <li><a href="#screen3_bg"><img src="images/ball3.png" alt="MainLink 3" /></a></li>
	    <li><a href="#screen4_bg"><img src="images/ball4.png" alt="MainLink 4" /></a></li>
	</ul>
	
	<div id="screen1_bg">
		
	    <div class="screen1_element_logo">
	    	<img src="images/screen1_logo.png" />
	    </div>

		<!-- STATIC PLAYERS -->
		<div class="screen1_player1"></div>
		<div class="screen1_player2"></div>

	</div>
	
	<div id="screen2_bg">
    	
    	<!-- MOVING DATES -->
    	<div class="screen2_nav2"></div>
    	<div class="screen2_nav3"></div>
    	<div class="screen2_nav4"></div>
		<div class="screen2_nav5"></div>
		<div class="screen2_nav1"></div>
    		
	    <div class="screen2_player">
			<img src="images/screen2_player.png" />
		</div>

		<div class="screen2_element_logo">
	    	<img src="images/screen2_logo.png" />
	    </div>
	</div>
	
	<section id="screen3_bg">

	    <div class="screen3_logo">
	        <img src="images/screen3_logo.png" alt="Logo">
	    </div>

	    <div class="screen3_text">
	        <h2>
	            STAY UPDATED WITH <br>
	            THE LATEST BASKETBALL MATCHUPS. <br>
	            CHECK DATES, TIMES, <br>
	            AND NEVER MISS A GAME.
	        </h2>
	    </div>

	    <div class="screen3_player">
	        <img src="images/screen3_player.png" alt="Player">
	    </div>

	</section> 
	
	<div id="screen4_bg">
		
	    <div class="screen4_socialicons">
		    <img src="images/screen4_socialicons.png" />
			<p>Copyright &copy; 2026 Pistons Game</p>
	    </div> 

        <div class="screen4_logo">
		    <img src="images/screen4_logo.png" />
		</div> 
	    
	</div>
	
	<script src="http://code.jquery.com/jquery-3.3.1.min.js"></script>
	<script src="scripts/jquery.parallax-1.1.3.js"></script>
	<script src="scripts/jquery.localscroll-1.2.7-min.js"></script>
	<script src="scripts/smoothscroll.js"></script>

	<script>
$(document).ready(function(){

    $('#nav').localScroll(800);

    $('#screen1_bg').parallax("50%", 0.1);
    $('#screen2_bg').parallax("50%", 0.1);
    $('#screen3_bg').parallax("50%", 0.3);
    $('#screen4_bg').parallax("50%", 0.3);

    // ONLY DATES MOVE NOW
    $('.screen2_nav2').parallax("50%", 0.3);
    $('.screen2_nav3').parallax("50%", 0.5);
    $('.screen2_nav4').parallax("50%", 0.2);
    $('.screen2_nav5').parallax("50%", 0.4);
    $('.screen2_nav1').parallax("50%", 0.6);

});
</script>
	
</body>
</html>
